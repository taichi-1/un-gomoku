<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const LANGUAGE_STORAGE_KEY = "ungomoku.lang";
        const THEME_STORAGE_KEY = "ungomoku.theme";

        const resolveLanguage = () => {
          try {
            const fromStorage = localStorage.getItem(LANGUAGE_STORAGE_KEY);
            if (typeof fromStorage === "string") {
              const normalized = fromStorage.toLowerCase();
              if (normalized.startsWith("ja")) return "ja";
              if (normalized.startsWith("en")) return "en";
            }
          } catch {}

          const browserLanguage = navigator.language?.toLowerCase() ?? "ja";
          return browserLanguage.startsWith("en") ? "en" : "ja";
        };

        const resolveTheme = () => {
          try {
            const fromStorage = localStorage.getItem(THEME_STORAGE_KEY);
            if (fromStorage === "light" || fromStorage === "dark") {
              return fromStorage;
            }
          } catch {}

          if (
            typeof window.matchMedia === "function" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          ) {
            return "dark";
          }
          return "light";
        };

        const root = document.documentElement;
        const language = resolveLanguage();
        const theme = resolveTheme();

        root.lang = language;
        root.dataset.theme = theme;
        root.classList.toggle("dark", theme === "dark");
        root.style.colorScheme = theme;

        const bgColor = theme === "dark" ? "#15110d" : "#f6efe3";
        let metaThemeColor = document.querySelector('meta[name="theme-color"]');
        if (!metaThemeColor) {
          metaThemeColor = document.createElement("meta");
          metaThemeColor.name = "theme-color";
          document.head.appendChild(metaThemeColor);
        }
        metaThemeColor.content = bgColor;
      })();
    </script>
    <title>un-gomoku</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#15110d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="un-gomoku" />
