name: ✅ CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new run is triggered for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: only read repo contents (needed for checkout)
permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    # Prevent hung jobs from consuming minutes; lint + typecheck + test typically finish in a few minutes
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test
