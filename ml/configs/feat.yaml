# Run 5: feature set v2 (5 input planes: + immediate win/block masks).
# The value net plateaued on raw stone planes across all prior runs; feeding
# tactical cells directly frees capacity for positional judgment.
# Bootstrapped by distillation from the strongest 3-plane net.
run_name: feat
seed: 5555
generations: 200

net:
  blocks: 8
  channels: 96
  in_planes: 5

search:
  max_children: 32
  m_root_cells: 16
  simulations: 64
  pass_simulations: 4
  c_puct: 1.5
  c_visit: 50.0
  c_scale: 1.0
  root_noise: true

selfplay:
  parallel_games: 256
  games_per_generation: 1000
  max_turns: 600

replay:
  capacity: 500000
  min_fill: 15000

train:
  batch_size: 512
  steps_per_generation: 1000
  lr: 0.0002
  weight_decay: 0.0001
  value_loss_weight: 1.0
  lambda_mix: 0.5

arena:
  every_generations: 1
  games: 300
  promote_threshold: 0.55
  simulations: 32
  parallel_games: 64
