# Run 4: 8x96 from the distilled checkpoint, double-quality search targets.
# Combines the capacity bet (Run 2) with the target-quality bet (Run 3).
run_name: large-deep
seed: 9696
generations: 200

net:
  blocks: 8
  channels: 96

search:
  max_children: 32
  m_root_cells: 24
  simulations: 128
  pass_simulations: 6
  c_puct: 1.5
  c_visit: 50.0
  c_scale: 1.0
  root_noise: true

selfplay:
  parallel_games: 256
  games_per_generation: 700
  max_turns: 600

replay:
  capacity: 400000
  min_fill: 12000

train:
  batch_size: 512
  steps_per_generation: 1000
  lr: 0.00015
  weight_decay: 0.0001
  value_loss_weight: 1.0
  # lambda 0.25 ablation (13:30-16:00 Thu) degraded clearly (gates 0.33);
  # reverted to 0.5 and resumed from best.pt.
  lambda_mix: 0.5

arena:
  every_generations: 1
  games: 200
  promote_threshold: 0.55
  simulations: 32
  parallel_games: 64
