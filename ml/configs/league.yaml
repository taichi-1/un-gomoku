# Run 8: league / fictitious-self-play. Same recipe as ownership (6x64, v2
# planes, double-threat + solver search, aux ownership head) but half of each
# generation's self-play games are played vs a frozen, diverse pool of
# past-best checkpoints instead of the current net. Targets the diagnosed
# self-play meta-collapse (a narrow mutual-racing equilibrium) by widening the
# opponent — and thus the value-target — distribution. Warm-started from the
# ownership frontier; ownership keeps running as the control.
run_name: league
seed: 7777
generations: 300

net:
  blocks: 6
  channels: 64
  in_planes: 5
  aux_ownership: true

search:
  max_children: 32
  m_root_cells: 16
  simulations: 64
  pass_simulations: 4
  c_puct: 1.5
  c_visit: 50.0
  c_scale: 1.0
  root_noise: true

selfplay:
  parallel_games: 256
  games_per_generation: 1000
  max_turns: 600

replay:
  capacity: 400000
  min_fill: 15000

train:
  batch_size: 512
  steps_per_generation: 1000
  lr: 0.0002
  weight_decay: 0.0001
  value_loss_weight: 1.0
  lambda_mix: 0.5
  ownership_weight: 0.08

arena:
  every_generations: 1
  games: 300
  promote_threshold: 0.55
  simulations: 32
  parallel_games: 64

league:
  enabled: true
  fraction: 0.5
  pool:
    - runs/ownership/ckpt_0020.pt   # earlier ownership self (past-self diversity)
    - runs/feat-small/star-gen31.pt # strong 6x64 v2 star (different run)
    - runs/large/best.pt            # 8x96, 3-plane (different arch + regime)
    - runs/feat/best.pt             # 8x96, 5-plane
