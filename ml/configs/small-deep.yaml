# Run 3: proven 6x64 net, double-quality search targets (sims 64 -> 128).
# Warm-start from Run-1 best (runs/default/best.pt). Tests whether target
# quality, not capacity, limited the small net.
run_name: small-deep
seed: 4242
generations: 200

net:
  blocks: 6
  channels: 64

search:
  max_children: 32
  m_root_cells: 24
  simulations: 128
  pass_simulations: 6
  c_puct: 1.5
  c_visit: 50.0
  c_scale: 1.0
  root_noise: true

selfplay:
  parallel_games: 256
  games_per_generation: 800
  max_turns: 600

replay:
  capacity: 400000
  min_fill: 15000

train:
  batch_size: 512
  steps_per_generation: 1000
  lr: 0.0001
  weight_decay: 0.0001
  value_loss_weight: 1.0
  lambda_mix: 0.5

arena:
  every_generations: 1
  games: 200
  promote_threshold: 0.55
  simulations: 32
  parallel_games: 64
