# Tiny end-to-end run: finishes in minutes on CPU. Validates the whole loop,
# not strength.
run_name: smoke
seed: 7
generations: 2

net:
  blocks: 2
  channels: 16

search:
  max_children: 16
  m_root_cells: 4
  simulations: 8
  pass_simulations: 1
  c_puct: 1.5
  c_visit: 50.0
  c_scale: 1.0
  root_noise: true

selfplay:
  parallel_games: 8
  games_per_generation: 12
  max_turns: 150

replay:
  capacity: 5000
  min_fill: 200

train:
  batch_size: 32
  steps_per_generation: 20
  lr: 0.0002
  weight_decay: 0.0001
  value_loss_weight: 1.0
  lambda_mix: 0.5

arena:
  every_generations: 1
  games: 8
  promote_threshold: 0.55
  simulations: 4
  parallel_games: 8
